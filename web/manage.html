<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.cdnfonts.com/css/arcade-classic"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- WaveSurfer for waveform visualizer -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  </head>
  <body>
    <nav class="surface center-content flex-gap">
      <a href="index.html" class="ghost-button">Game</a>
      <a href="manage.html" class="accent-button active" aria-current="page">Manage Songs</a>
    </nav>
    <main>
      <h1>Song Management</h1>
      
      <section id="upload-song" class="surface">
        <h2>Add New Song</h2>
        <form id="upload-form" class="flex-gap">
          <label>
            <span class="label">Song ID (slug)</span>
            <input id="new-song-id" type="text" placeholder="my-awesome-song" required class="input-control" />
          </label>
          <label>
            <span class="label">Audio File</span>
            <input id="new-song-audio" type="file" accept="audio/*" required class="input-control" />
          </label>
          <button type="submit" class="accent-button">Upload</button>
          <span id="upload-status" role="status" aria-live="polite"></span>
        </form>
      </section>

      <section id="edit-song" class="surface">
        <h2>Select Song to Edit</h2>
        <div class="controls flex-gap">
          <select id="song-edit-select" aria-label="Select Song to Edit" class="input-control">
            <option value="">Loading songs...</option>
          </select>
        </div>
      </section>

      <section id="song-editor" class="hidden surface" aria-hidden="true">
        <h2 id="editor-title">Editing</h2>
        
        <div id="waveform-container">
          <div id="waveform"></div>
          <div id="timeline"></div>
        </div>
        
        <div class="editor-controls">
          <button id="btn-play-pause" class="accent-button">Play / Pause</button>
          <button id="btn-stop-audio" class="ghost-button">Stop</button>
          <span id="audio-time">0:00 / 0:00</span>
        </div>

        <div class="bpm-controls">
          <fieldset>
            <legend>BPM & Timing</legend>
            <label>
              <span class="label">BPM</span>
              <input id="song-bpm" type="number" step="0.1" value="120" class="input-control" />
            </label>
            <label>
              <span class="label">Global Offset (ms)</span>
              <input id="global-offset" type="number" value="0" class="input-control" />
            </label>
            <div class="bpm-actions">
              <button id="btn-tap-bpm" type="button" class="accent-button">Tap BPM</button>
              <button id="btn-analyze-bpm" type="button" class="ghost-button">Analyze BPM</button>
            </div>
          </fieldset>
          
          <div class="manual-timings flex-gap">
            <label>
              <span class="label">Left Timings (ms)</span>
              <textarea id="left-timings" placeholder="1000, 2000, ..." class="input-control"></textarea>
            </label>
            <label>
              <span class="label">Right Timings (ms)</span>
              <textarea id="right-timings" placeholder="1500, 2500, ..." class="input-control"></textarea>
            </label>
            <button id="btn-save-chart" class="accent-button">Save Chart</button>
            <span id="save-status" role="status" aria-live="polite"></span>
          </div>
        </div>
      </section>
    </main>
    <script src="manage.js"></script>
  </body>
</html>
