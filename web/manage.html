<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="vendor/oat.min.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- WaveSurfer for waveform visualizer -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="spectral-waveform.js"></script>
  </head>
  <body class="rhythm-app">
    <header class="app-header">
      <nav class="app-nav" aria-label="Primary">
        <menu class="buttons app-nav-menu">
          <li><a href="index.html" class="button ghost ghost-button">Game</a></li>
          <li><a href="manage.html" class="button accent-button active" aria-current="page">Manage Songs</a></li>
        </menu>
      </nav>
    </header>
    <main>
      <header class="page-header">
        <h1>Song Management</h1>
      </header>
      
      <section id="upload-song" class="surface surface-plain">
        <header class="section-header">
          <h2>Add New Song</h2>
        </header>
        <div class="song-source-tabs" role="tablist" aria-label="Song import methods">
          <button
            id="tab-upload-song"
            type="button"
            class="song-source-tab active"
            data-mode="upload"
            aria-selected="true"
          >
            Upload File
          </button>
          <button
            id="tab-download-song"
            type="button"
            class="song-source-tab"
            data-mode="download"
            aria-selected="false"
          >
            Download URL
          </button>
        </div>
        <div id="song-source-upload" class="song-source-panel">
          <form id="upload-form" class="flex-gap">
            <label>
              <span class="label">Song ID</span>
              <input id="new-song-id" type="text" placeholder="my-awesome-song" required class="input-control" />
            </label>
            <label>
              <span class="label">Audio File</span>
              <input id="new-song-audio" type="file" accept="audio/*" required class="input-control" />
            </label>
            <button type="submit" class="accent-button">Upload</button>
            <output id="upload-status" role="status" aria-live="polite"></output>
          </form>
        </div>
        <div id="song-source-download" class="song-source-panel hidden" aria-hidden="true">
          <form id="download-form" class="flex-gap">
            <label>
              <span class="label">Song ID</span>
              <input id="download-song-id" type="text" placeholder="soundcloud-import" required class="input-control" />
            </label>
            <label class="song-download-url-field">
              <span class="label">Source URL</span>
              <input id="download-song-url" type="url" placeholder="https://soundcloud.com/..." required class="input-control" />
            </label>
            <button type="submit" class="accent-button">Download</button>
            <output id="download-status" role="status" aria-live="polite"></output>
          </form>
          <p class="beat-grid-hint">Supports SoundCloud and other sources supported by <code>yt-dlp</code>.</p>
        </div>
      </section>

      <section id="edit-song" class="surface surface-plain">
        <header class="section-header">
          <h2>Select Song to Edit</h2>
        </header>
        <div class="controls flex-gap edit-song-controls">
          <label class="song-select-field">
            <span class="label">Song</span>
            <select id="song-edit-select" aria-label="Select Song to Edit" class="input-control">
              <option value="">Loading songs...</option>
            </select>
          </label>
          <menu class="buttons controls-menu" aria-label="Chart actions">
            <li><button id="btn-save-chart" class="accent-button">Save Chart</button></li>
          </menu>
          <output id="save-status" role="status" aria-live="polite"></output>
        </div>
      </section>

      <section id="song-editor" class="hidden surface surface-plain" aria-hidden="true" aria-labelledby="editor-title">
        <header class="section-header">
          <h2 id="editor-title">Editing</h2>
        </header>
        
        <div id="waveform-container">
          <div id="waveform"></div>
          <div class="waveform-composite">
            <div
              id="spectral-waveform-scroll"
              class="spectral-waveform-scroll"
              title="Use mouse wheel to zoom waveform"
            >
              <canvas
                id="manage-spectral-waveform"
                class="spectral-waveform"
                width="960"
                height="88"
                aria-label="Colored spectral waveform"
              ></canvas>
              <div class="zoom-beat-grid-wrap">
                <div id="zoom-beat-grid" class="zoom-beat-grid" role="grid" aria-label="1/2 beat grid for note placement">
                  <p class="beat-grid-empty">Beat grid will appear after a song loads.</p>
                </div>
              </div>
            </div>
            <div class="overview-waveform-wrap">
              <canvas
                id="manage-spectral-waveform-overview"
                class="spectral-waveform spectral-waveform-overview"
                width="960"
                height="72"
                aria-label="Full song waveform with current zoom window"
              ></canvas>
            </div>
          </div>
          <div id="timeline"></div>
          <menu class="editor-controls buttons" aria-label="Playback controls">
            <li><button id="btn-play-pause" class="accent-button">Play</button></li>
            <li><button id="btn-stop-playback" class="ghost ghost-button" type="button">Stop</button></li>
            <li class="editor-status-item"><output id="audio-time">0:00 / 0:00</output></li>
          </menu>
        </div>

        <div class="bpm-controls">
          <fieldset>
            <legend>BPM & Timing</legend>
            <div class="timing-input-row">
              <label>
                <span class="label">BPM</span>
                <input id="song-bpm" type="number" step="0.1" value="120" class="input-control" />
              </label>
              <label>
                <span class="label">Beat Grid Offset (ms)</span>
                <input id="global-offset" type="number" value="0" class="input-control" />
              </label>
            </div>
            <menu class="bpm-actions buttons" aria-label="Timing tools">
              <li><button id="btn-tap-bpm" type="button" class="accent-button">Tap BPM</button></li>
              <li><button id="btn-auto-pattern" type="button" class="accent-button">Auto Pattern</button></li>
              <li><button id="btn-analyze-audio" type="button" class="ghost ghost-button">Analyze Song</button></li>
            </menu>
          </fieldset>
        </div>
      </section>
    </main>
    <script src="manage.js"></script>
  </body>
</html>
