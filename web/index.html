<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Arcade+Gamer&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="surface center-content flex-gap">
      <a href="index.html" class="active accent-button" aria-current="page">Game</a>
      <a href="manage.html" class="ghost-button">Manage Songs</a>
    </nav>
    <main>
      <h1>Rhythm Jump</h1>
      
      <section id="game-status" class="surface">
        <div class="status-grid">
          <div class="status-item surface center-content flex-gap">
            <span class="label">Session:</span>
            <span id="run-status" aria-live="polite">Connecting...</span>
          </div>
          <div class="status-item surface center-content flex-gap">
            <span class="label">Last Action:</span>
            <span id="last-action" aria-live="polite">None</span>
          </div>
        </div>
      </section>

      <section id="song-selection" class="surface">
        <h2>Choose Song</h2>
        <div class="controls flex-gap">
          <select id="song-select" aria-label="Select Song" class="input-control">
            <option value="">Loading songs...</option>
          </select>
          <button id="btn-start" type="button" class="accent-button">Start Game</button>
          <button id="btn-stop" type="button" class="ghost-button">Stop</button>
        </div>
      </section>

      <section id="visualization" class="surface">
        <h2>Physical State</h2>
        <div class="input-indicators flex-gap center-content">
          <div id="box-left" class="box-indicator">Left Box</div>
          <div id="box-right" class="box-indicator">Right Box</div>
        </div>
        <canvas
          id="visualizer"
          width="600"
          height="100"
          aria-label="LED Strip Visualization"
        ></canvas>
        <p class="hint">Keyboard: A/Space (Left), L/Enter (Right)</p>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
