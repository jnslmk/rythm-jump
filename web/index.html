<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="active">Game</a>
      <a href="manage.html">Manage Songs</a>
    </nav>
    <main>
      <h1>Rhythm Jump</h1>
      
      <section id="game-status">
        <div class="status-grid">
          <div class="status-item">
            <span class="label">Session:</span>
            <span id="run-status">Connecting...</span>
          </div>
          <div class="status-item">
            <span class="label">Last Action:</span>
            <span id="last-action">None</span>
          </div>
        </div>
      </section>

      <section id="song-selection">
        <h2>Choose Song</h2>
        <div class="controls">
          <select id="song-select" aria-label="Select Song">
            <option value="">Loading songs...</option>
          </select>
          <button id="btn-start" type="button">Start Game</button>
          <button id="btn-stop" type="button" class="secondary">Stop</button>
        </div>
      </section>

      <section id="visualization">
        <h2>Physical State</h2>
        <div class="input-indicators">
          <div id="box-left" class="box-indicator">Left Box</div>
          <div id="box-right" class="box-indicator">Right Box</div>
        </div>
        <canvas
          id="visualizer"
          width="600"
          height="100"
          aria-label="LED Strip Visualization"
        ></canvas>
        <p class="hint">Keyboard: A/Space (Left), L/Enter (Right)</p>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
