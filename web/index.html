<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  </head>
  <body>
    <nav class="center-content flex-gap">
      <a href="index.html" class="active accent-button" aria-current="page">Game</a>
      <a href="manage.html" class="ghost-button">Manage Songs</a>
    </nav>
    <main>
      <h1>Rhythm Jump</h1>
      
      <section id="song-selection" class="surface surface-plain">
        <h2>Choose Song</h2>
        <div class="controls flex-gap">
          <select id="song-select" aria-label="Select Song" class="input-control">
            <option value="">Loading songs...</option>
          </select>
          <button id="btn-start" type="button" class="accent-button">Start Game</button>
          <button id="btn-stop" type="button" class="ghost-button">Stop</button>
        </div>
      </section>

      <section id="waveform-section" class="surface surface-plain">
        <h2>Waveform</h2>
        <div id="waveform-container">
          <div id="waveform"></div>
          <div class="waveform-composite">
            <div
              id="game-spectral-waveform-scroll"
              class="spectral-waveform-scroll"
              title="Drag to pan waveform window"
            >
              <canvas
                id="game-spectral-waveform"
                class="spectral-waveform"
                width="960"
                height="88"
                aria-label="Zoomed colored spectral waveform"
              ></canvas>
              <div class="zoom-beat-grid-wrap">
                <div
                  id="game-zoom-beat-grid"
                  class="zoom-beat-grid zoom-beat-grid-readonly"
                  role="grid"
                  aria-label="Read-only beat grid with note lanes"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </section>

    <section id="visualization" class="surface surface-plain">
      <canvas
        id="visualizer"
        width="960"
        height="70"
        aria-label="LED Strip Visualization"
      ></canvas>
      <p class="hint">Keyboard: A/Space (Left), L/Enter (Right)</p>
    </section>

    <div class="surface surface-plain debug-toggle-wrapper">
      <button id="btn-toggle-debug" class="ghost-button" type="button">Hide overlay</button>
    </div>

    <section id="debug-panel" class="surface surface-plain debug-panel">
      <div class="debug-header">
        <h2>Debug Overlay</h2>
      </div>
      <div class="debug-body">
        <div class="debug-row">
          <div>
            <span class="label">Remaining play time:</span>
            <span id="debug-remaining-time">--</span>
          </div>
          <div class="timing-windows">
            <span class="label">Timing zones:</span>
            <span id="debug-perfect-window">Perfect ±0 ms</span>
            <span id="debug-good-window">Good ±0 ms</span>
          </div>
        </div>
        <div class="lane-panels">
          <div class="lane-panel">
            <div class="lane-title">Left Lane</div>
            <div class="timeline-group">
              <span class="timeline-label">Triggers</span>
              <div id="left-trigger-timeline" class="timeline-list"></div>
            </div>
            <div class="timeline-group">
              <span class="timeline-label">Button presses</span>
              <div id="left-press-timeline" class="timeline-list"></div>
            </div>
          </div>
          <div class="lane-panel">
            <div class="lane-title">Right Lane</div>
            <div class="timeline-group">
              <span class="timeline-label">Triggers</span>
              <div id="right-trigger-timeline" class="timeline-list"></div>
            </div>
            <div class="timeline-group">
              <span class="timeline-label">Button presses</span>
              <div id="right-press-timeline" class="timeline-list"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <audio id="song-audio" preload="auto" hidden></audio>
  <script src="game.js"></script>
  </body>
</html>
