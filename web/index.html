<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Jump - Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="vendor/oat.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="theme.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="spectral-waveform.js"></script>
  </head>
  <body class="rhythm-app">
    <header class="app-header">
      <nav class="app-nav" aria-label="Primary">
        <ul class="buttons app-nav-menu" role="list">
          <li><a href="index.html" class="button accent-button active" aria-current="page">Game</a></li>
          <li><a href="manage.html" class="button ghost ghost-button">Manage Songs</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h1 class="page-title">Rhythm Jump</h1>
      
      <section
        id="song-selection"
        class="surface surface-plain"
        aria-labelledby="song-selection-title"
      >
        <header class="section-header">
          <h2 id="song-selection-title">Choose Song</h2>
        </header>
        <div class="controls flex-gap game-session-controls">
          <label class="song-select-field" for="song-select">
            <span class="label">Song</span>
            <select id="song-select" class="input-control">
              <option value="">Loading songs...</option>
            </select>
          </label>
          <ul class="buttons controls-menu" aria-label="Session controls" role="list">
            <li><button id="btn-start" type="button" class="accent-button">Start Game</button></li>
            <li><button id="btn-stop" type="button" class="ghost-button">Stop</button></li>
          </ul>
        </div>
      </section>

      <section
        id="waveform-section"
        class="surface surface-plain"
        aria-labelledby="waveform-title"
      >
        <header class="section-header">
          <h2 id="waveform-title">Waveform</h2>
        </header>
        <div id="waveform-container">
          <div id="waveform"></div>
          <div class="waveform-composite">
            <div
              id="game-spectral-waveform-scroll"
              class="spectral-waveform-scroll"
              title="Drag to pan waveform window"
            >
              <canvas
                id="game-spectral-waveform"
                class="spectral-waveform"
                width="960"
                height="88"
                aria-label="Zoomed colored spectral waveform"
              ></canvas>
              <div class="zoom-beat-grid-wrap">
                <div
                  id="game-zoom-beat-grid"
                  class="zoom-beat-grid zoom-beat-grid-readonly"
                  role="grid"
                  aria-label="Read-only beat grid with note lanes"
                ></div>
              </div>
            </div>
            <div class="overview-waveform-wrap">
              <canvas
                id="game-spectral-waveform-overview"
                class="spectral-waveform spectral-waveform-overview"
                width="960"
                height="72"
                aria-label="Full song waveform with current zoom window"
              ></canvas>
            </div>
          </div>
        </div>
      </section>

      <section
        id="visualization"
        class="surface surface-plain"
        aria-labelledby="visualization-title"
      >
        <header class="section-header">
          <h2 id="visualization-title">LED Preview</h2>
        </header>
        <canvas
          id="visualizer"
          width="960"
          height="70"
          aria-label="LED Strip Visualization"
        ></canvas>
        <div id="led-beat-feedback" class="led-beat-feedback" aria-label="Beat hit feedback"></div>
        <div class="game-timing-summary" aria-labelledby="game-timing-summary-title">
          <p id="game-timing-summary-title" class="label">Timing Zones</p>
          <div class="timing-windows game-timing-windows">
            <p id="game-perfect-window">Perfect ±0 ms</p>
            <p id="game-good-window">Good ±0 ms</p>
          </div>
        </div>
        <dl class="game-meta-row hint">
          <div>
            <dt class="label">Keyboard</dt>
            <dd>A/Space (Left), L/Enter (Right)</dd>
          </div>
          <div>
            <dt class="label">Current</dt>
            <dd id="game-current-time">--</dd>
          </div>
          <div>
            <dt class="label">Length</dt>
            <dd id="game-track-length">--</dd>
          </div>
        </dl>
      </section>
    </main>
    <audio id="song-audio" preload="auto" hidden></audio>
    <script src="shared-ui.js"></script>
    <script src="visualizer-projection.js"></script>
    <script src="game.js"></script>
  </body>
</html>
