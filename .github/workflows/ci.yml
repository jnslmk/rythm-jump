name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend deps
        run: uv sync --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run backend tests
        run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install web deps
        run: npm install

      - name: Lint web assets
        run: npx eslint web/*.js && npx stylelint "web/*.css"
