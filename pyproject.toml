[project]
name = "rythm-jump"
version = "0.1.0"
description = "Rhythm Jump - A rhythm game with LED visualization"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.116.0,<1.0.0",
    "uvicorn>=0.35.0,<1.0.0",
]

[project.scripts]
dev = "rythm_jump.cli:dev"

[dependency-groups]
dev = [
    "httpx>=0.28.0,<1.0.0",
    "pytest>=8.4.0,<9.0.0",
]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rythm_jump"]
