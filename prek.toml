#:schema: https://www.schemastore.org/prek.json

[[repos]]
repo = "local"
hooks = [
    { id = "ruff-check", name = "ruff check", entry = "uv run ruff check", language = "system", types = ["python"] },
    { id = "ruff-format", name = "ruff format", entry = "uv run ruff format", language = "system", types = ["python"] },
    { id = "ty", name = "ty type check", entry = "uv run ty check", language = "system", types = ["python"], pass_filenames = false },
]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.3.0"
hooks = [
    { id = "codespell", name = "codespell", entry = "uv run codespell", language = "system", files = "^((?!node_modules|\\.venv).)*$" },
]

[[repos]]
repo = "https://github.com/DavidAnson/markdownlint-cli2"
rev = "v0.17.2"
hooks = [
    { id = "markdownlint-cli2", name = "markdownlint", entry = "npx markdownlint-cli2", language = "system", files = "\\.md$" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "stylelint", name = "stylelint", entry = "npx stylelint --fix", language = "system", files = "\\.css$" },
    { id = "eslint", name = "eslint", entry = "npx eslint --fix", language = "system", files = "\\.js$" },
]
